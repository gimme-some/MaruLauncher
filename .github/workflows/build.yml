name: Build

# Push to master (or click "Run workflow") builds the launcher on macOS,
# Linux, and Windows. The installers are uploaded as downloadable artifacts
# on the run page — they are NOT published to a Release automatically, so the
# existing manual release flow stays in control.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # One runner failing should not cancel the others (e.g. still get the
      # macOS .dmg even if a different OS build hiccups).
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Build
        # No code-signing certificate in CI: skip auto-discovery so the macOS
        # build does not fail looking for one (it produces an unsigned .dmg).
        # --publish never: do not touch GitHub Releases; we collect artifacts.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --publish never
        shell: bash

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: maru-launcher-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: ignore
          retention-days: 14
